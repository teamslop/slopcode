id = "slopcode"
name = "SlopCode"
description = "The open source coding agent."
version = "1.2.15"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/anomalyco/slopcode"

[agent_servers.slopcode]
name = "SlopCode"
icon = "./icons/slopcode.svg"

[agent_servers.slopcode.targets.darwin-aarch64]
archive = "https://github.com/anomalyco/slopcode/releases/download/v1.2.15/slopcode-darwin-arm64.zip"
cmd = "./slopcode"
args = ["acp"]

[agent_servers.slopcode.targets.darwin-x86_64]
archive = "https://github.com/anomalyco/slopcode/releases/download/v1.2.15/slopcode-darwin-x64.zip"
cmd = "./slopcode"
args = ["acp"]

[agent_servers.slopcode.targets.linux-aarch64]
archive = "https://github.com/anomalyco/slopcode/releases/download/v1.2.15/slopcode-linux-arm64.tar.gz"
cmd = "./slopcode"
args = ["acp"]

[agent_servers.slopcode.targets.linux-x86_64]
archive = "https://github.com/anomalyco/slopcode/releases/download/v1.2.15/slopcode-linux-x64.tar.gz"
cmd = "./slopcode"
args = ["acp"]

[agent_servers.slopcode.targets.windows-x86_64]
archive = "https://github.com/anomalyco/slopcode/releases/download/v1.2.15/slopcode-windows-x64.zip"
cmd = "./slopcode.exe"
args = ["acp"]
