name: slopcode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  slopcode:
    if: |
      contains(github.event.comment.body, ' /sc') ||
      startsWith(github.event.comment.body, '/sc') ||
      contains(github.event.comment.body, ' /slopcode') ||
      startsWith(github.event.comment.body, '/slopcode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Check required credentials
        id: guard
        env:
          HAVE_API_KEY: ${{ secrets.SLOPCODE_API_KEY != '' && 'true' || 'false' }}
        run: |
          if [ "$HAVE_API_KEY" != "true" ]; then
            echo "Skipping /sc workflow: missing SLOPCODE_API_KEY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run slopcode
        if: steps.guard.outputs.ready == 'true'
        uses: grappeggia/slopcode/github@latest
        env:
          SLOPCODE_API_KEY: ${{ secrets.SLOPCODE_API_KEY }}
          SLOPCODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: slopcode/claude-opus-4-5
