name: slopcode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  slopcode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /slopcode') ||
      startsWith(github.event.comment.body, '/slopcode')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run slopcode
        uses: anomalyco/slopcode/github@latest
        env:
          SLOPCODE_API_KEY: ${{ secrets.SLOPCODE_API_KEY }}
          SLOPCODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: slopcode/claude-opus-4-5
