name: sign-cli

on:
  push:
    branches:
      - brendan/desktop-signpath
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  sign-cli:
    runs-on: ubuntu-latest
    if: github.repository == 'teamslop/slopcode'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Check required credentials
        id: guard
        env:
          HAVE_SIGNPATH_API_KEY: ${{ secrets.SIGNPATH_API_KEY != '' && 'true' || 'false' }}
          HAVE_SIGNPATH_ORG: ${{ secrets.SIGNPATH_ORGANIZATION_ID != '' && 'true' || 'false' }}
          HAVE_SIGNPATH_PROJECT: ${{ secrets.SIGNPATH_PROJECT_SLUG != '' && 'true' || 'false' }}
          HAVE_SIGNPATH_POLICY: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG != '' && 'true' || 'false' }}
          HAVE_SIGNPATH_ARTIFACT: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG != '' && 'true' || 'false' }}
        run: |
          if [ "$HAVE_SIGNPATH_API_KEY" != "true" ] || [ "$HAVE_SIGNPATH_ORG" != "true" ] || [ "$HAVE_SIGNPATH_PROJECT" != "true" ] || [ "$HAVE_SIGNPATH_POLICY" != "true" ] || [ "$HAVE_SIGNPATH_ARTIFACT" != "true" ]; then
            echo "Skipping sign-cli: SignPath credentials are not fully configured"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.guard.outputs.ready == 'true'
        run: |
          ./packages/slopcode/script/build.ts

      - name: Upload unsigned Windows CLI
        id: upload_unsigned_windows_cli
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-slopcode-windows-cli
          path: packages/slopcode/dist/slopcode-windows-x64/bin/slopcode.exe
          if-no-files-found: error

      - name: Submit SignPath signing request
        id: submit_signpath_signing_request
        if: steps.guard.outputs.ready == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_KEY }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned_windows_cli.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-slopcode-cli

      - name: Upload signed Windows CLI
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signed-slopcode-windows-cli
          path: signed-slopcode-cli/*.exe
          if-no-files-found: error
