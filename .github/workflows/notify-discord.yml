name: notify-discord

on:
  release:
    types: [released] # fires when a draft release is published

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        id: guard
        env:
          HAVE_DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK != '' && 'true' || 'false' }}
        run: |
          if [ "$HAVE_DISCORD_WEBHOOK" != "true" ]; then
            echo "Skipping Discord notification: missing DISCORD_WEBHOOK"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Send nicely-formatted embed to Discord
        if: steps.guard.outputs.ready == 'true'
        uses: SethCohen/github-releases-to-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
