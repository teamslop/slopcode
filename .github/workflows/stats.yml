name: stats

on:
  schedule:
    - cron: "0 12 * * *" # Run daily at 12:00 UTC
  workflow_dispatch: # Allow manual trigger

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  stats:
    if: github.repository == 'teamslop/slopcode'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Check required credentials
        id: guard
        env:
          HAVE_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY != '' && 'true' || 'false' }}
        run: |
          if [ "$HAVE_POSTHOG_KEY" != "true" ]; then
            echo "Skipping stats: missing POSTHOG_KEY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run stats script
        if: steps.guard.outputs.ready == 'true'
        run: bun script/stats.ts

      - name: Commit stats
        if: steps.guard.outputs.ready == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add STATS.md
          git diff --staged --quiet || git commit -m "ignore: update download stats $(date -I)"
          git push
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
