name: publish
run-name: "${{ format('release {0}', inputs.version || inputs.bump || 'manual') }}"

on:
  workflow_dispatch: # Default release path; `bun run release` prepares assets locally and dispatches this workflow
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write # npm trusted publishing
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.repository == 'teamslop/slopcode'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          slopcode-app-id: ${{ vars.SLOPCODE_APP_ID }}
          slopcode-app-secret: ${{ secrets.SLOPCODE_APP_SECRET }}

      - name: Install SlopCode
        if: inputs.bump || inputs.version
        run: bun i -g slopcode

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
          SLOPCODE_BUMP: ${{ inputs.bump }}
          SLOPCODE_VERSION: ${{ inputs.version }}
          GH_REPO: ${{ (github.ref_name == 'beta' && 'teamslop/slopcode-beta') || github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-tauri:
    if: false # Non-npm publishing channel disabled
    needs:
      - version
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: apple-actions/import-codesign-certs@v2
        if: ${{ runner.os == 'macOS' }}
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Certificate
        if: ${{ runner.os == 'macOS' }}
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: Setup Apple API Key
        if: ${{ runner.os == 'macOS' }}
        run: |
          echo "${{ secrets.APPLE_API_KEY_PATH }}" > $RUNNER_TEMP/apple-api-key.p8

      - uses: ./.github/actions/setup-bun

      - name: Cache apt packages
        if: contains(matrix.settings.host, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-${{ matrix.settings.target }}-apt-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-apt-

      - name: install dependencies (ubuntu only)
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          mkdir -p ~/apt-cache && chmod -R a+rw ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends -o dir::cache::archives="$HOME/apt-cache" libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          sudo chmod -R a+rw ~/apt-cache

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - name: Prepare
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          SLOPCODE_VERSION: ${{ needs.version.outputs.version }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Resolve tauri portable SHA
        if: contains(matrix.settings.host, 'ubuntu')
        run: echo "TAURI_PORTABLE_SHA=$(git ls-remote https://github.com/tauri-apps/tauri.git refs/heads/feat/truly-portable-appimage | cut -f1)" >> "$GITHUB_ENV"

      # Fixes AppImage build issues, can be removed when https://github.com/tauri-apps/tauri/pull/12491 is released
      - name: Install tauri-cli from portable appimage branch
        uses: taiki-e/cache-cargo-install-action@v3
        if: contains(matrix.settings.host, 'ubuntu')
        with:
          tool: tauri-cli
          git: https://github.com/tauri-apps/tauri
          # branch: feat/truly-portable-appimage
          rev: ${{ env.TAURI_PORTABLE_SHA }}

      - name: Show tauri-cli version
        if: contains(matrix.settings.host, 'ubuntu')
        run: cargo tauri --version

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          slopcode-app-id: ${{ vars.SLOPCODE_APP_ID }}
          slopcode-app-secret: ${{ secrets.SLOPCODE_APP_SECRET }}

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        timeout-minutes: 60
        with:
          projectPath: packages/desktop
          uploadWorkflowArtifacts: true
          tauriScript: ${{ (contains(matrix.settings.host, 'ubuntu') && 'cargo tauri') || '' }}
          args: --target ${{ matrix.settings.target }} --config ${{ (github.ref_name == 'beta' && './src-tauri/tauri.beta.conf.json') || './src-tauri/tauri.prod.conf.json' }} --verbose
          updaterJsonPreferNsis: true
          releaseId: ${{ needs.version.outputs.release }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseDraft: true
          releaseAssetNamePattern: slopcode-desktop-[platform]-[arch][ext]
          repo: ${{ (github.ref_name == 'beta' && 'slopcode-beta') || '' }}
          releaseCommitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.p8

  publish:
    needs:
      - version
    runs-on: ubuntu-latest
    if: needs.version.outputs.version != ''
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        if: false # Non-npm publishing channel disabled
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: false # Non-npm publishing channel disabled
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: false # Non-npm publishing channel disabled
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          slopcode-app-id: ${{ vars.SLOPCODE_APP_ID }}
          slopcode-app-secret: ${{ secrets.SLOPCODE_APP_SECRET }}

      - name: Download CLI dist bundle
        run: |
          rm -rf packages/slopcode/dist
          mkdir -p packages/slopcode/dist
          for attempt in $(seq 1 30); do
            if gh release download ${{ needs.version.outputs.tag }} --pattern "slopcode-cli-dist.tar.gz" --dir packages/slopcode/dist --repo ${{ needs.version.outputs.repo }}; then
              tar -xzf packages/slopcode/dist/slopcode-cli-dist.tar.gz -C packages/slopcode/dist
              rm packages/slopcode/dist/slopcode-cli-dist.tar.gz
              exit 0
            fi
            rm -f packages/slopcode/dist/slopcode-cli-dist.tar.gz
            if [ "$attempt" -eq 30 ]; then
              echo "Timed out waiting for slopcode-cli-dist.tar.gz on release ${{ needs.version.outputs.tag }}" >&2
              exit 1
            fi
            sleep 10
          done
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      - name: Install package repository tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev gnupg rpm createrepo-c

      - name: Publish release
        run: ./script/publish.ts
        env:
          SLOPCODE_PUBLISH_ONLY: true
          # npm trusted publishing uses GitHub Actions OIDC; prebuilt release assets are downloaded above.
          # Homebrew tap sync
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || steps.committer.outputs.token }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'teamslop/homebrew-slopcode' }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH || 'main' }}
          HOMEBREW_TAP_PATH: ${{ vars.HOMEBREW_TAP_PATH || 'Formula/slopcode.rb' }}
          SLOPCODE_DISABLE_HOMEBREW: ${{ vars.SLOPCODE_DISABLE_HOMEBREW || 'true' }}
          SLOPCODE_ENFORCE_APT: ${{ vars.SLOPCODE_ENFORCE_APT || 'false' }}
          SLOPCODE_ENFORCE_RPM: ${{ vars.SLOPCODE_ENFORCE_RPM || 'false' }}
          SLOPCODE_ENFORCE_APK: ${{ vars.SLOPCODE_ENFORCE_APK || 'false' }}
          SLOPCODE_ENFORCE_MACPORTS: ${{ vars.SLOPCODE_ENFORCE_MACPORTS || 'false' }}
          SLOPCODE_DISABLE_APT: ${{ vars.SLOPCODE_DISABLE_APT || 'true' }}
          SLOPCODE_DISABLE_RPM: ${{ vars.SLOPCODE_DISABLE_RPM || 'true' }}
          SLOPCODE_DISABLE_APK: ${{ vars.SLOPCODE_DISABLE_APK || 'true' }}
          SLOPCODE_DISABLE_MACPORTS: ${{ vars.SLOPCODE_DISABLE_MACPORTS || 'true' }}
          # Homebrew core PR sync (non-blocking)
          HOMEBREW_CORE_TOKEN: ${{ secrets.HOMEBREW_CORE_TOKEN || steps.committer.outputs.token }}
          HOMEBREW_CORE_FORK_REPO: ${{ vars.HOMEBREW_CORE_FORK_REPO || '' }}
          HOMEBREW_CORE_UPSTREAM_REPO: ${{ vars.HOMEBREW_CORE_UPSTREAM_REPO || 'Homebrew/homebrew-core' }}
          HOMEBREW_CORE_BASE_BRANCH: ${{ vars.HOMEBREW_CORE_BASE_BRANCH || 'master' }}
          HOMEBREW_CORE_PATH: ${{ vars.HOMEBREW_CORE_PATH || 'Formula/s/slopcode.rb' }}
          HOMEBREW_CORE_BRANCH_PREFIX: ${{ vars.HOMEBREW_CORE_BRANCH_PREFIX || 'slopcode-bump-' }}
          # AUR sync
          AUR_KEY: ${{ secrets.AUR_KEY }}
          AUR_REPO: ${{ vars.AUR_REPO || 'slopcode-bin' }}
          AUR_BRANCH: ${{ vars.AUR_BRANCH || 'master' }}
          AUR_PACKAGE: ${{ vars.AUR_PACKAGE || 'slopcode-bin' }}
          # apt repository sync
          APT_REPO_TOKEN: ${{ secrets.APT_REPO_TOKEN || steps.committer.outputs.token }}
          APT_REPO_REPO: ${{ vars.APT_REPO_REPO || 'teamslop/apt-slopcode' }}
          APT_REPO_BRANCH: ${{ vars.APT_REPO_BRANCH || 'main' }}
          APT_REPO_DIST: ${{ vars.APT_REPO_DIST || 'stable' }}
          APT_REPO_COMPONENT: ${{ vars.APT_REPO_COMPONENT || 'main' }}
          APT_REPO_BASE_URL: ${{ vars.APT_REPO_BASE_URL || 'https://teamslop.github.io/apt-slopcode' }}
          APT_REPO_ORIGIN: ${{ vars.APT_REPO_ORIGIN || 'SlopCode' }}
          APT_REPO_LABEL: ${{ vars.APT_REPO_LABEL || 'SlopCode' }}
          APT_REPO_DESCRIPTION: ${{ vars.APT_REPO_DESCRIPTION || 'SlopCode apt repository' }}
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
          APT_REPO_GPG_KEY_ID: ${{ secrets.APT_REPO_GPG_KEY_ID }}
          # rpm repository sync
          RPM_REPO_TOKEN: ${{ secrets.RPM_REPO_TOKEN || steps.committer.outputs.token }}
          RPM_REPO_REPO: ${{ vars.RPM_REPO_REPO || 'teamslop/rpm-slopcode' }}
          RPM_REPO_BRANCH: ${{ vars.RPM_REPO_BRANCH || 'main' }}
          RPM_REPO_BASE_URL: ${{ vars.RPM_REPO_BASE_URL || 'https://teamslop.github.io/rpm-slopcode' }}
          # apk repository sync
          APK_REPO_TOKEN: ${{ secrets.APK_REPO_TOKEN || steps.committer.outputs.token }}
          APK_REPO_REPO: ${{ vars.APK_REPO_REPO || 'teamslop/apk-slopcode' }}
          APK_REPO_BRANCH: ${{ vars.APK_REPO_BRANCH || 'main' }}
          APK_REPO_BASE_URL: ${{ vars.APK_REPO_BASE_URL || 'https://teamslop.github.io/apk-slopcode' }}
          APK_REPO_IMAGE: ${{ vars.APK_REPO_IMAGE || 'alpine:3.20' }}
          # MacPorts sync
          MACPORTS_TOKEN: ${{ secrets.MACPORTS_TOKEN || steps.committer.outputs.token }}
          MACPORTS_FORK_REPO: ${{ vars.MACPORTS_FORK_REPO || '' }}
          MACPORTS_UPSTREAM_REPO: ${{ vars.MACPORTS_UPSTREAM_REPO || 'macports/macports-ports' }}
          MACPORTS_BASE_BRANCH: ${{ vars.MACPORTS_BASE_BRANCH || '' }}
          MACPORTS_PORT_PATH: ${{ vars.MACPORTS_PORT_PATH || 'devel/slopcode/Portfile' }}
          MACPORTS_BRANCH_PREFIX: ${{ vars.MACPORTS_BRANCH_PREFIX || 'slopcode-bump-' }}
          SLOPCODE_VERSION: ${{ needs.version.outputs.version }}
          SLOPCODE_RELEASE: ${{ needs.version.outputs.release }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          NPM_CONFIG_PROVENANCE: true
