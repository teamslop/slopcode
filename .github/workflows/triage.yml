name: triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Check required credentials
        id: guard
        env:
          HAVE_API_KEY: ${{ secrets.SLOPCODE_API_KEY != '' && 'true' || 'false' }}
        run: |
          if [ "$HAVE_API_KEY" != "true" ]; then
            echo "Skipping triage: missing SLOPCODE_API_KEY"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Install slopcode
        if: steps.guard.outputs.ready == 'true'
        run: curl -fsSL https://slopcode.dev/install | bash

      - name: Triage issue
        if: steps.guard.outputs.ready == 'true'
        env:
          SLOPCODE_API_KEY: ${{ secrets.SLOPCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          slopcode run --agent triage "The following issue was just opened, triage it:

          Title: $ISSUE_TITLE

          $ISSUE_BODY"
